name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Create .env for CI
        run: cp .env.example .env
      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true
      - name: Lint (verify:lint)
        run: pnpm verify:lint
      - name: Type check (verify:type-check)
        run: pnpm verify:type-check
      - name: Format check (verify:format)
        run: pnpm verify:format
      - name: Tests (verify:test)
        run: pnpm verify:test
      - name: i18n check (verify:i18n)
        run: pnpm verify:i18n
      - name: Config check (verify:config)
        run: pnpm verify:config

  docs-cleanliness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Detect historical leftovers in docs (R-2)
        run: |
          # 仕様書（explanation / reference / how-to）に取り消し線・削除お知らせブロックが残っていないか検出
          # ADR / lessons / reports / personas / recurrence-prevention は除外（履歴を残してよい場所）
          LEFTOVERS=$(grep -rnE "~~F-[0-9]+~~|~~.+~~ — \*\*ADR-[0-9]+|削除お知らせ|履歴のため残置|旧 F-[0-9]+ 仕様" \
            docs/explanation docs/reference/basic_spec.md docs/reference/functional_spec.md \
            docs/reference/constraints.md docs/reference/glossary.md docs/how-to \
            2>/dev/null || true)
          if [ -n "$LEFTOVERS" ]; then
            echo "ERROR: 仕様書に削除履歴の痕跡が残っています。ADR にのみ集約してください (R-2)："
            echo "$LEFTOVERS"
            echo ""
            echo "解決方法: 仕様書から取り消し線・削除お知らせブロックを完全削除し、履歴は ADR ファイルにのみ残す"
            exit 1
          fi
          echo "✓ 仕様書に削除履歴の痕跡なし"

  template-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify placeholder integrity
        run: |
          ALLOWED="APP_NAME APP_SLUG ANDROID_PACKAGE IOS_BUNDLE_IDENTIFIER APP_SCHEME DESCRIPTION EAS_PROJECT_ID PLACEHOLDER"
          FOUND=$(grep -roh '{{[A-Z_]*}}' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
            --include='*.json' --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.sh' --include='*.env*' \
            --exclude-dir=node_modules --exclude-dir=.git \
            2>/dev/null | sed 's/{{//;s/}}//' | sort -u || true)

          EXIT=0
          for placeholder in $FOUND; do
            if ! echo "$ALLOWED" | grep -qw "$placeholder"; then
              echo "ERROR: Unknown placeholder {{$placeholder}}"
              EXIT=1
            fi
          done

          if [ "$EXIT" -ne 0 ]; then
            exit 1
          fi
          echo "All placeholders are from the allowed set: $FOUND"
