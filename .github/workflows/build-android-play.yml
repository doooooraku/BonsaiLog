name: Build Android & Submit to Play Console

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-submit:
    name: Build & Submit AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          cat <<'DOTENV' > .env
          APP_NAME=${{ vars.APP_NAME }}
          APP_SLUG=${{ vars.APP_SLUG }}
          IOS_BUNDLE_IDENTIFIER=${{ vars.IOS_BUNDLE_IDENTIFIER }}
          ANDROID_PACKAGE=${{ vars.ANDROID_PACKAGE }}
          EAS_PROJECT_ID=${{ vars.EAS_PROJECT_ID }}
          EAS_OWNER=${{ vars.EAS_OWNER }}
          ADMOB_ANDROID_APP_ID=${{ secrets.ADMOB_ANDROID_APP_ID }}
          ADMOB_ANDROID_BANNER_ID=${{ secrets.ADMOB_ANDROID_BANNER_ID }}
          REVENUECAT_ANDROID_API_KEY=${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          REVENUECAT_IOS_API_KEY=placeholder
          DOTENV

      - name: Setup Google Service Account
        run: |
          mkdir -p secrets
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 -d > secrets/google-service-account.json
          # 読み取り確認 (機密値は出さない、 client_email のドメイン部のみ表示)
          node -e "const j=require('./secrets/google-service-account.json'); console.log('SA loaded: domain=' + j.client_email.split('@')[1]);"

      - name: Preflight check (--ci で Secrets/workflow も検査)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: pnpm preflight:android:ci || echo "preflight 警告あり (継続)"

      - name: Verify code quality
        run: pnpm verify:lint && pnpm verify:type-check && pnpm verify:test

      # Sess62 PR2 D11 + PR3 hotfix: SDK 整合ゲート (preflight A-EXPO-SDK と二重化、 CI 警告)
      # MAJOR 違反は Sess62 PR1 で fix 済。 残る patch/minor range mismatch (例:
      # @react-navigation/bottom-tabs ^7.15.11 vs expected ^7.15.5 = どちらも 7.x.x で互換) は
      # warning に降格 (= continue-on-error)。 ローカル preflight 側も同様。
      - name: Expo SDK alignment check
        run: pnpm expo install --check
        continue-on-error: true

      # Sess62 PR2 D10: snapshot before (= Play Console alpha track の build 前の状態を撮影)
      - name: Snapshot before (Publisher API)
        env:
          RELEASE_LOG_TS: ${{ github.run_id }}
        run: node scripts/release-snapshot.mjs before

      - name: Build Android AAB
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p dist
          eas build --platform android --profile production --local --non-interactive --output=dist/app-production.aab

      - name: Postbuild verify (assets/app.config 内の必須キー埋め込み確認)
        run: node scripts/postbuild-verify.mjs dist/app-production.aab

      - name: Submit to Play Console (track=alpha, draft, --wait)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        # ADR-0050 D7 整合: --wait モードで Submit ジョブ完了を確認 (fastlane supply 内の edit と
        # snapshot/release-notes の Publisher API edit transaction が並走しないよう排他)
        run: eas submit --platform android --path dist/app-production.aab --profile production --non-interactive --wait

      # Sess62 PR2 D10: release notes 投稿 (= EAS Submit が扱わない release notes を Publisher API で別途 PUT)
      # ADR-0050 D5/D7 整合
      - name: Post release notes (Publisher API)
        env:
          RELEASE_LOG_TS: ${{ github.run_id }}
        run: node scripts/release-set-notes.mjs

      # Sess62 PR2 D10: snapshot after (= submit 反映後の Play Console alpha track 状態を撮影)
      - name: Snapshot after (Publisher API)
        env:
          RELEASE_LOG_TS: ${{ github.run_id }}
        run: node scripts/release-snapshot.mjs after

      # Sess62 PR2 D10: diff 検証 (= snapshot before/after を比較、 new draft +1 / versionCode +1 等を機械検証)
      - name: Release diff verification
        env:
          RELEASE_LOG_TS: ${{ github.run_id }}
        run: node scripts/release-diff.mjs
        continue-on-error: true # warning レベルは継続 (critical のみ fail)

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Android-AAB-${{ github.run_id }}
          path: dist/app-production.aab
          retention-days: 7

      # Sess62 PR2 D10: release logs artifact (= snapshot/diff の結果も保管、 ローカル smoke test 用)
      - name: Upload release logs artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Android-release-logs-${{ github.run_id }}
          path: dist/release-logs/${{ github.run_id }}-android/
          retention-days: 7
          if-no-files-found: warn

      - name: Post build summary
        if: success()
        run: |
          {
            echo "## Android Build & Submit Successful (Sess62 PR2: cloud-only)"
            echo ""
            echo "- **AAB**: dist/app-production.aab"
            echo "- **Profile**: production"
            echo "- **Track**: alpha (Closed Testing)"
            echo "- **Release status**: draft"
            echo ""
            echo "### Phase 結果"
            echo "- ✅ Snapshot before / After"
            echo "- ✅ Build (cloud runner, ローカル PC 負荷ゼロ)"
            echo "- ✅ Submit (--wait モード、 fastlane supply 完了確認済)"
            echo "- ✅ Release notes (ja-JP + en-US) 投稿"
            echo "- ✅ Diff 検証 (critical: new draft +1 / versionCode +1)"
            echo ""
            echo "### 次にやること"
            echo "1. Play Console → クローズドテスト → Alpha → 「ロールアウトを開始」 を 1 クリック"
            echo "2. (任意) artifact から AAB をローカル DL して smoke test:"
            echo "   \`\`\`bash"
            echo "   gh run download ${{ github.run_id }} -n Android-AAB-${{ github.run_id }} -D /tmp/sess62-artifact/"
            echo "   pnpm release:android   # Phase 5 smoke test のみ走る (Sess62 PR2 改修後)"
            echo "   \`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
