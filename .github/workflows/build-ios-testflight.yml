name: Build iOS & Submit to TestFlight

# 案 B (macos-15 + eas build --local) で EAS Free 月 30 回上限を回避。
# Public repo のため macos runner は無料、PoC を何度試しても 0 円。
# 詳細: docs/adr/ADR-0050-android-release-automation.md Sess106 Amendment

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-submit:
    name: Build & Submit IPA
    # macos-15 に pin (Xcode 16.x 安定版)。突然壊れるリスク最小化。
    # 月 1 回、image bump 時に Claude が macos-16 へ移行検討。
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        # 案 B: EXPO_APPLE_TEAM_ID / TYPE は eas build --local 実行時に EAS CLI が
        # 自動で credentials.json を組み立てるために env から読む (Apple Developer Portal
        # から Provisioning Profile 自動取得に必須)。
        run: |
          cat <<'DOTENV' > .env
          APP_NAME=${{ vars.APP_NAME }}
          APP_SLUG=${{ vars.APP_SLUG }}
          IOS_BUNDLE_IDENTIFIER=${{ vars.IOS_BUNDLE_IDENTIFIER }}
          ANDROID_PACKAGE=${{ vars.ANDROID_PACKAGE }}
          EAS_PROJECT_ID=${{ vars.EAS_PROJECT_ID }}
          EAS_OWNER=${{ vars.EAS_OWNER }}
          ADMOB_IOS_APP_ID=${{ secrets.ADMOB_IOS_APP_ID }}
          ADMOB_IOS_BANNER_ID=${{ secrets.ADMOB_IOS_BANNER_ID }}
          REVENUECAT_IOS_API_KEY=${{ secrets.REVENUECAT_IOS_API_KEY }}
          ADMOB_ANDROID_APP_ID=placeholder
          ADMOB_ANDROID_BANNER_ID=placeholder
          REVENUECAT_ANDROID_API_KEY=placeholder
          DOTENV

      # AdMob banner ID stage gate (Android workflow と同型、Sess95 PR-6 R-68 同型)
      # closed-testing 中はテスターの本番広告クリック = AdMob ポリシー違反 (アカウント停止リスク)
      # のため Google デモ ID (接頭辞 3940256099942544) 必須。production 昇格時は
      # repo variable RELEASE_STAGE=production を設定するとデモ ID を fail にする
      # (= 戻し忘れ収益ゼロ事故防止)。
      - name: AdMob banner ID stage gate
        env:
          BANNER_ID: ${{ secrets.ADMOB_IOS_BANNER_ID }}
          RELEASE_STAGE: ${{ vars.RELEASE_STAGE }}
        run: |
          STAGE="${RELEASE_STAGE:-closed-testing}"
          case "$BANNER_ID" in
            *3940256099942544*) IS_DEMO=1 ;;
            *) IS_DEMO=0 ;;
          esac
          if [ "$STAGE" = "production" ] && [ "$IS_DEMO" = "1" ]; then
            echo "::error::RELEASE_STAGE=production なのに AdMob iOS banner ID がデモ ID です (収益ゼロ事故)。本番 ID に戻してください。"
            exit 1
          fi
          if [ "$STAGE" != "production" ] && [ "$IS_DEMO" = "0" ]; then
            echo "::error::closed-testing 中は AdMob iOS デモ banner ID 必須です (テスターの本番広告クリック = ポリシー違反リスク)。gh secret set ADMOB_IOS_BANNER_ID でデモ ID に変更してください。"
            exit 1
          fi
          echo "OK: stage=$STAGE / demo_id=$IS_DEMO (整合)"

      - name: Setup ASC API Key
        # base64 化された .p8 を runner 上で復元。eas.json submit.production.ios.ascApiKeyPath
        # が "./secrets/AuthKey.p8" を参照するため、この path に置く。
        # ファイル権限を 600 に絞り、ログにも値が漏れないよう echo は base64 のまま。
        run: |
          mkdir -p secrets
          echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 -d > secrets/AuthKey.p8
          chmod 600 secrets/AuthKey.p8
          # 鍵自体は表示せず、サイズと先頭マーカーだけで存在確認
          echo "ASC API Key: $(wc -c < secrets/AuthKey.p8) bytes, head=$(head -c 27 secrets/AuthKey.p8)"

      - name: Prebuild env check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: node scripts/prebuild-env-check.mjs ios

      - name: Verify code quality
        # Android workflow と同じ verify:lint + verify:type-check + verify:test の 3 点セット
        run: pnpm verify:lint && pnpm verify:type-check && pnpm verify:test

      # Expo SDK alignment (Android workflow と同型、patch/minor mismatch は warning)
      - name: Expo SDK alignment check
        run: pnpm expo install --check
        continue-on-error: true

      - name: Build iOS IPA (eas build --local on macos-15)
        # --local = EAS Cloud quota を消費しない (公式: https://docs.expo.dev/build-reference/local-builds/)。
        # macos-15 runner 上の Xcode で archive、IPA 出力。EAS Free 月 30 回上限の影響なし。
        # credentials は EAS サーバー側で管理 (Distribution Cert + Provisioning Profile を自動 fetch)。
        # 初回 build 時は ASC API Key で Apple Developer Portal から BonsaiLog 専用 Provisioning Profile を自動生成。
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          EXPO_APPLE_TEAM_TYPE: ${{ vars.APPLE_TEAM_TYPE }}
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/secrets/AuthKey.p8
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          mkdir -p dist
          eas build --platform ios --profile production --local --non-interactive --output=dist/app.ipa

      - name: Verify Privacy Manifest inclusion
        # ADR-0017 §⑤ Privacy Manifest (PrivacyInfo.xcprivacy) が IPA に同梱されているか
        # 構造的に検証。欠落だと Apple 審査時に「Missing Privacy Manifest」 警告。
        # 自分宣言 (アプリ側) + SDK 同梱 (AdMob/UMP) の最低 2 つを期待。
        run: |
          MANIFEST_COUNT=$(unzip -l dist/app.ipa | grep -c "PrivacyInfo.xcprivacy" || true)
          echo "PrivacyInfo.xcprivacy 同梱数: $MANIFEST_COUNT"
          if [ "$MANIFEST_COUNT" -lt 1 ]; then
            echo "::error::Privacy Manifest が IPA に含まれていません。app.config.ts の ios.privacyManifests を確認 (ADR-0017 §⑤)"
            exit 1
          fi
          echo "OK: Privacy Manifest 同梱確認"

      - name: Submit to TestFlight (--wait)
        # --no-wait でなく --wait に変更 (Repolog テンプレからの改善)。
        # submit ジョブ完了まで watch することで、submit 失敗を即時検知。
        # ASC API Key 経由なので Apple ID + 2FA 不要、完全自動。
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas submit --platform ios --path dist/app.ipa --profile production --non-interactive --wait

      - name: Cleanup ASC API Key
        # 後始末: .p8 を runner 上から削除 (runner は ephemeral だが念のため)
        if: always()
        run: |
          if [ -f secrets/AuthKey.p8 ]; then
            rm -f secrets/AuthKey.p8
            echo "ASC API Key 削除済"
          fi

      - name: Upload IPA artifact (失敗時のみ、debug 用)
        # 案 B 改善: 成功時は TestFlight が永続保持するので artifact 不要。
        # 失敗時のみ debug 用に保管 (200MB × 7 日)。
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: BonsaiLog-iOS-IPA-${{ github.run_id }}
          path: dist/app.ipa
          retention-days: 7
          if-no-files-found: warn

      - name: Post build summary
        if: success()
        run: |
          {
            echo "## iOS Build & Submit Successful (案 B: macos-15 + --local)"
            echo ""
            echo "- **IPA**: dist/app.ipa"
            echo "- **Profile**: production"
            echo "- **Bundle ID**: ${{ vars.IOS_BUNDLE_IDENTIFIER }}"
            echo "- **ASC App ID**: 6763495229"
            echo "- **Submitted to**: TestFlight (--wait で完了確認済)"
            echo ""
            echo "### Phase 結果"
            echo "- ✅ AdMob banner ID stage gate"
            echo "- ✅ pnpm verify (lint + type-check + test)"
            echo "- ✅ Expo SDK alignment (continue-on-error)"
            echo "- ✅ EAS build --local (Cloud quota 消費 0)"
            echo "- ✅ Privacy Manifest 同梱検証"
            echo "- ✅ EAS submit --wait (TestFlight processing 開始確認済)"
            echo ""
            echo "### 次にやること"
            echo "1. App Store Connect → TestFlight → BonsaiLog → 新しい build (processing 完了まで 10-15 分)"
            echo "2. 内部テスター追加 (App Store Connect → TestFlight → 内部テスト)"
            echo "3. (任意) Beta App Review 申請 (外部テスター向け)"
          } >> "$GITHUB_STEP_SUMMARY"
