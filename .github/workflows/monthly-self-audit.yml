name: Monthly Self Audit

# Sess108 案 8 — 認知飽和ガード + 効果計測 6 軸の月次集約 (#1292)
#
# 由来:
#   - Notion 215 prompts 分析 (Sess108) で「認知飽和 + 計測欠落」 構造リスクを検出
#   - r:inventory / memory:stale / metrics:report を fan-out 並列実行
#   - 結果を 1 Issue に集約 (label:self-audit) して「読まれる棚卸」 を保証
#
# Schedule:
#   - cron: 月初 0 時 UTC (= 9 時 JST、 月の 1 日)
#   - workflow_dispatch: 手動 trigger 可

on:
  schedule:
    # 毎月 1 日 00:00 UTC = 09:00 JST
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  inventory:
    name: R-rule inventory
    runs-on: ubuntu-latest
    outputs:
      report: ${{ steps.run.outputs.report }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'

      - name: Run r-rule-inventory
        id: run
        run: |
          set +e
          node scripts/dev/r-rule-inventory.mjs --json > inventory.json
          {
            echo 'report<<REPORT_EOF'
            cat inventory.json
            echo
            echo REPORT_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: r-rule-inventory
          path: inventory.json

  memory_stale:
    name: Memory stale detector
    runs-on: ubuntu-latest
    outputs:
      report: ${{ steps.run.outputs.report }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'

      - name: Run memory-stale-detector
        id: run
        run: |
          # CI 環境では ~/.claude/projects/.../memory/ が存在しないので 0 件 report が default
          set +e
          node scripts/dev/memory-stale-detector.mjs --json > stale.json
          {
            echo 'report<<REPORT_EOF'
            cat stale.json
            echo
            echo REPORT_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: memory-stale
          path: stale.json

  metrics:
    name: 6-axis prompt metrics
    runs-on: ubuntu-latest
    outputs:
      report: ${{ steps.run.outputs.report }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'

      - name: Run measure-prompt-metrics
        id: run
        run: |
          set +e
          # CI 環境では .claude/metrics/*.jsonl は commit されていないので 0 件 report が default
          node scripts/dev/measure-prompt-metrics.mjs --json > metrics.json
          {
            echo 'report<<REPORT_EOF'
            cat metrics.json
            echo
            echo REPORT_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: prompt-metrics
          path: metrics.json

  aggregate:
    name: Aggregate and create issue
    runs-on: ubuntu-latest
    needs: [inventory, memory_stale, metrics]
    steps:
      - name: Compose issue body
        id: compose
        env:
          INVENTORY: ${{ needs.inventory.outputs.report }}
          STALE: ${{ needs.memory_stale.outputs.report }}
          METRICS: ${{ needs.metrics.outputs.report }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          {
            echo 'body<<BODY_EOF'
            echo "# Monthly Self Audit — $DATE"
            echo ''
            echo 'Sess108 案 8 — 認知飽和ガード + 効果計測 6 軸の月次集約。'
            echo ''
            echo '## 1. R-rule inventory'
            echo ''
            echo '```json'
            echo "${INVENTORY:-{}}"
            echo '```'
            echo ''
            echo '## 2. Memory stale candidates'
            echo ''
            echo '```json'
            echo "${STALE:-{}}"
            echo '```'
            echo ''
            echo '## 3. 6-axis prompt metrics'
            echo ''
            echo '```json'
            echo "${METRICS:-{}}"
            echo '```'
            echo ''
            echo '## Next actions'
            echo ''
            echo '- 退役推奨候補が出ていれば PR 化 (新規 R 追加とセット推奨)'
            echo '- stale memory は `/memory-review` Skill で統合判断'
            echo '- 6 軸達成度 < 80% なら Stage A 改善の追加策を /discuss で検討'
            echo ''
            echo '🤖 Generated by .github/workflows/monthly-self-audit.yml'
            echo BODY_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create or update issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const body = `${{ steps.compose.outputs.body }}`;
            const date = new Date().toISOString().slice(0, 10);
            const title = `chore(self-audit): monthly report ${date}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['self-audit'],
            });
