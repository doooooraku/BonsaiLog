## Phase G2 part 1 WorkPicker formSheet 実機検証 flow (ADR-0024)
##
## 検証目的: `(modals)/work-picker` (formSheet) が実機で 3/3 安定動作するか確認。
## 結果: 2026-05-12 R-30 現基準 3/3 = 100% PASS 達成 (scroll + visibility 50 + Continue dismiss + お師匠の真柏 tap)。
##
## 経路 (Dev Client + Onboarding skip + seedTestData + 詳細画面):
## 1. App 起動 (clearState: true)
## 2. Dev Client menu → localhost:8081 tap
## 3. Continue dialog dismiss (text tap + pressKey 両方)
## 4. Onboarding skip (Welcome → Language ja → Tut1-5 skip)
## 5. 盆栽タブ → 設定タブ → scrollUntilVisible seed button (visibilityPercentage 50) → seedTestData → 盆栽タブへ
## 6. 1 件目の盆栽 (お師匠の真柏、created_at desc で top) を tap → 詳細画面
## 7. 履歴タブ FAB tap → /(modals)/work-picker (formSheet) 表示
## 8. watering (水やり) tap → router.back() で詳細画面に戻る
##    (WorkLogConfirmSheet は G2 part 2 で formSheet 化予定、本 flow では表示確認まで)
##
## 実機実行コマンド (3 回反復、R-30 現基準):
##   for i in 1 2 3; do maestro test maestro/flows/g2-work-picker.yml; done
appId: 'com.dooooraku.bonsailog'
---
- launchApp:
    clearState: true

# Dev Client menu → localhost:8081 tap
- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Expo Dev Client Continue dialog 自動 dismiss (text tap + pressKey 両方で確実)
- tapOn:
    text: 'Continue'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd
- pressKey: 'Back'
- waitForAnimationToEnd

# Onboarding Welcome → 「はじめる」 tap
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Language → ja → next
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Tut1-5 全 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut1'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut2'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut3'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut4'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ到達確認 (empty CTA 可視で判定)
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ tap (testID 経由、「設定」 text tap だと Developer Menu 誤起動) → seedTestData
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# seedTestData button は画面下にあるため scrollUntilVisible で確実に到達
# visibilityPercentage: 50 で一部画面内なら OK (100% だと bottom safe area で届かず)
- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Alert OK dismiss
- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 盆栽タブへ戻る (testID 経由)
- tapOn:
    id: 'e2e_tab_bonsai'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 1 件目の盆栽 (お師匠の真柏) が seedTestData の DB write + reload 後に visible になるまで待つ
- extendedWaitUntil:
    visible:
      text: 'お師匠の真柏'
    timeout: 30000
- tapOn:
    text: 'お師匠の真柏'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 詳細画面で作業履歴タブが default 表示、緑 FAB tap
- extendedWaitUntil:
    visible:
      id: 'e2e_history_bottom_cta'
    timeout: 10000
- tapOn:
    id: 'e2e_history_bottom_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# work-picker formSheet 表示確認
- assertVisible:
    id: 'e2e_work_picker_screen'
- assertVisible:
    id: 'e2e_work_picker_grid'

# watering (水やり) 選択 → router.back() で詳細画面に戻り
- tapOn:
    id: 'e2e_work_picker_watering'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 詳細画面の履歴タブ FAB 再表示で動作確認 (work-picker → WorkLogConfirmSheet 自動展開予定だが本 flow では FAB 可視で OK)
- assertVisible:
    id: 'e2e_history_bottom_cta'
