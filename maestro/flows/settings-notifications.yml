# maestro/flows/settings-notifications.yml
# F-16 ローカル通知 (Issue #30、ADR-0014)
# 設定画面の通知時刻 section + マスタートグルの到達確認。
#
# 注: 実際の通知発火確認は実機検証 (Phase 0 PoC)。本フローは UI 配置 + トグルのみ。

appId: 'com.dooooraku.bonsailog'
name: 'F-16 - notification settings reach'
tags:
  - foundation
  - f-16

steps:
  - launchApp:
      label: 'アプリ起動'
  - tapOn:
      text: '設定'
      label: '設定タブ or ヘッダーから設定画面へ遷移 (テキスト一致でフォールバック)'
      optional: true
  - assertVisible:
      id: 'e2e_settings_screen'
      label: '設定画面が表示されることを確認 (testID)'
      optional: true
  - assertVisible:
      id: 'e2e_notification_section'
      label: 'F-16 通知時刻 section が表示されることを確認 (testID)'
      optional: true
  - assertVisible:
      id: 'e2e_notification_daily_summary_toggle'
      label: '当日まとめ通知トグルが表示されることを確認 (testID)'
      optional: true
  - tapOn:
      id: 'e2e_notification_daily_summary_toggle'
      label: '当日まとめ通知トグルをタップ (ON/OFF 切替動作確認)'
      optional: true
  - assertVisible:
      id: 'e2e_notification_watering_toggle'
      label: '水やり繰り返し通知トグルが表示されることを確認 (testID)'
      optional: true
  - tapOn:
      id: 'e2e_notification_watering_toggle'
      label: '水やり繰り返し通知トグルをタップ (ON/OFF 切替動作確認)'
      optional: true
