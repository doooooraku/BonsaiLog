appId: 'com.doooooraku.bonsailog'
name: 'E2E - F-04 watering heatmap (stats tab)'
tags:
  - e2e
  - f-04
  - watering
  - heatmap


# Issue #29 / ADR-0013 / AC12-5 雛形。
# stats タブを開き、ヒートマップ + Skia Canvas + 凡例 + サマリーが
# 描画されることを screen-reach 系で確認する。
# Sandbox 連携 (実盆栽データ前提) は人間タスクで別途検証。

---
- launchApp:
    clearState: true
    label: 'クリーン起動 (DB 初期化)'

- tapOn:
    text: 'Stats'
    optional: true
    label: 'stats タブをタップ (英語ロケール)'

- runFlow:
    when:
      visible: '統計'
    commands:
      - tapOn: '統計'
        label: 'stats タブをタップ (日本語ロケール)'

- assertVisible:
    id: 'e2e_stats_screen'
    label: 'stats 画面到達'

- assertVisible:
    id: 'e2e_stats_watering_heatmap'
    label: 'ヒートマップが描画される (集約モード)'

- assertVisible:
    id: 'e2e_heatmap_skia_canvas'
    label: 'Skia Canvas 背面描画'

- assertVisible:
    id: 'e2e_heatmap_summary'
    label: '凡例下サマリー (記録日数 / 件数)'
# TODO (Sandbox 連携):
# - 1825 件 + 100 本 events で 60 FPS 確認 (実機 Pixel 7 / iPhone 13)
# - VoiceOver / TalkBack で a11y label 読み上げ確認
# - iOS Color Filters Grayscale モードで数字併記視覚確認 (Phase G 以降で評価)
