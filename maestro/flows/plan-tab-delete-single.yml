# maestro/flows/plan-tab-delete-single.yml
# Sess27 PR-7 (ADR-0036 D1-D4, D5 撤回): PlanScreen 個別 EventRow long-press → カスタム ConfirmDialog
# → 削除 button tap → bulkSoftDeleteEvents + cancelForEvents + reload + 通知 Toast 3s
#
# 前提: 設定タブ → e2e_dev_seed_button で seed data 投入済、 予定タブに planned events が存在
# Dev Client 環境では URL list 経由で bundle 読込が必要 (Sess27 PR-7 改修、 旧 pressKey Back を撤去)
appId: 'com.dooooraku.bonsailog'
---
- launchApp:
    clearState: false

# Dev Client URL list (初回 launch時のみ): bundle 読込を tap で起動
- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 30000

# bundle 読込完了後 home list 表示確認
- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_home_list'
    timeout: 30000

# 予定タブに遷移
- tapOn:
    text: '予定'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 10000

# planned group 行を展開 (e2e_plan_group_planned_watering 等、 seed 内容に依存)
- tapOn:
    id: 'e2e_plan_group_planned_watering'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# 個別 EventRow を long-press → ConfirmDialog (ADR-0036 D1-D6)
# 注: event ID は random ULID なので、 group 内の 1 件目を text または bonsaiName で識別
- longPressOn:
    text: '水やり'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# カスタム ConfirmDialog (planned single 文言「この予定を削除しますか?」) 表示確認
- assertVisible:
    id: 'e2e_plan_confirm_delete'

# 「削除」 button tap (DANGER 赤、 Haptics Warning 発火 → bulkSoftDeleteEvents + Undo Snackbar)
- tapOn:
    id: 'e2e_plan_confirm_delete_confirm'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# 通知 Toast 表示確認 (3s、 Sess27 PR-7 で UndoSnackbar 撤回 → 通知 Toast のみ、 ADR-0036 D5 撤回)
- assertVisible:
    id: 'e2e_toast'
