appId: 'com.doooooraku.bonsailog'
name: 'E2E - F-11 backup screens reach'
tags:
  - e2e
  - backup
  - settings

---
- launchApp:
    clearState: true
    label: 'クリーン起動'

- extendedWaitUntil:
    visible:
      id: 'e2e_home_screen'
    timeout: 60000
    label: 'Home の初期描画を待機'

# Home → Settings ルート (router.push('/settings'))
- runFlow:
    when:
      visible:
        id: 'e2e_open_settings'
    commands:
      - tapOn:
          id: 'e2e_open_settings'
          label: '設定を開く'

- extendedWaitUntil:
    visible:
      id: 'e2e_settings_screen'
    timeout: 30000
    label: '設定画面を待機'

- assertVisible:
    id: 'e2e_settings_screen'
    label: '設定画面を確認'

# Settings → お引っ越し (作成/復元 統合画面)
- tapOn:
    id: 'e2e_open_backup'
    label: 'お引っ越し画面を開く'

- extendedWaitUntil:
    visible:
      id: 'e2e_backup_screen'
    timeout: 30000
    label: 'お引っ越し画面を待機'

- assertVisible:
    id: 'e2e_backup_screen'
    label: 'お引っ越し画面に到達'

# 1 画面に作成/復元の両ボタンが存在する
- assertVisible:
    id: 'e2e_backup_export_action'
    label: 'バックアップ作成ボタンを確認'

- assertVisible:
    id: 'e2e_backup_import_action'
    label: 'バックアップ復元ボタンを確認'

- back:
    label: '設定へ戻る'

- assertVisible:
    id: 'e2e_settings_screen'
    label: '設定画面へ復帰'
