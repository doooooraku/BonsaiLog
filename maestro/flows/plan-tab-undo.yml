# maestro/flows/plan-tab-undo.yml
# Sess26 PR-η-4 (ADR-0036 D5 / R-44): 削除実行後 UndoSnackbar 4s 表示
# [元に戻す] tap で restoreEvents + cancelForEvents + reload → 復元
appId: 'com.doooooraku.bonsailog'
---
- launchApp:
    clearState: false

- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

- pressKey: 'Back'
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_home_list'
    timeout: 20000

- tapOn:
    text: '予定'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 10000

# group 行 long-press → ConfirmDialog → 削除 (Undo シナリオの前提として 1 件削除)
- longPressOn:
    id: 'e2e_plan_group_planned_watering'
- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    id: 'e2e_plan_confirm_delete'

- tapOn:
    id: 'e2e_plan_confirm_delete_confirm'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# UndoSnackbar 4s 表示確認 + [元に戻す] button assert
- assertVisible:
    id: 'e2e_toast'
- assertVisible:
    id: 'e2e_toast_action'

# [元に戻す] tap (4s 以内、 restoreEvents + reload で削除前に戻る)
- tapOn:
    id: 'e2e_toast_action'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# 復元後、 削除した group が再表示されている (group 行が visible)
- assertVisible:
    id: 'e2e_plan_group_planned_watering'
