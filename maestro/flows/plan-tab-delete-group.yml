# maestro/flows/plan-tab-delete-group.yml
# Sess26 PR-η-4 (ADR-0036 D2/D8): PlanScreen group 行 long-press → ConfirmDialog
# (group まとめ削除、 wiring 含む場合 title 末尾 cascade note 補足)
appId: 'com.doooooraku.bonsailog'
---
- launchApp:
    clearState: false

- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

- pressKey: 'Back'
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_home_list'
    timeout: 20000

- tapOn:
    text: '予定'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 10000

# planned group 行 (展開せず) を long-press → ConfirmDialog (group まとめ削除)
- longPressOn:
    id: 'e2e_plan_group_planned_watering'
- waitForAnimationToEnd:
    timeout: 3000

# ConfirmDialog (planned group 文言「この予定 N 件をまとめて削除しますか?」) 表示確認
- assertVisible:
    id: 'e2e_plan_confirm_delete'

# 「削除」 button tap
- tapOn:
    id: 'e2e_plan_confirm_delete_confirm'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# UndoSnackbar 表示確認 (N 件まとめて削除した文言)
- assertVisible:
    id: 'e2e_toast'
