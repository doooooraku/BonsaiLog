## Phase G1 StylePicker formSheet 実機検証 flow (ADR-0024 Provisionally Accepted)
##
## 検証目的: `(modals)/style-picker` (formSheet) が実機で 5/5 安定動作するか確認。
##
## 検証手順:
## 1. App 起動
## 2. 盆栽タブで FAB tap → 新規追加画面 (BonsaiCreate)
## 3. 樹形選択 row tap → /(modals)/style-picker (formSheet) 表示
## 4. 「chokkan」 (直幹) tap → router.back() で BonsaiCreate に戻る
## 5. 樹形フィールドに「直幹」 表示を確認
##
## 実機実行コマンド:
##   maestro test maestro/flows/g1-style-picker.yml --repeat 5
appId: app.bonsailog
---
- launchApp:
    clearState: false

- assertVisible:
    id: 'e2e_bonsai_tab_screen'
    optional: true

# 盆栽タブ FAB tap → BonsaiCreate 画面
- tapOn:
    id: 'e2e_bonsai_fab'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# 樹形選択 row tap
- tapOn:
    id: 'e2e_bonsai_create_style_pick'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# style-picker formSheet 表示確認
- assertVisible:
    id: 'e2e_style_picker_screen'

# 直幹 (chokkan) 選択 → router.back()
- tapOn:
    id: 'e2e_style_option_chokkan'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# BonsaiCreate に戻り、樹形フィールド更新を確認
- assertVisible:
    id: 'e2e_bonsai_create_style_pick'
