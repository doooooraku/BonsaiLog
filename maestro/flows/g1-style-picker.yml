## Phase G1 StylePicker formSheet 実機検証 flow (ADR-0024 Provisionally Accepted)
##
## 検証目的: `(modals)/style-picker` (formSheet) が実機で 5/5 安定動作するか確認。
##
## 経路 (Dev Client + Onboarding skip + 空 state CTA):
## 1. App 起動 (clearState: true)
## 2. Dev Client menu → localhost:8081 tap
## 3. Onboarding skip (Welcome → Language ja → Tut1-5 skip)
## 4. 盆栽タブ empty CTA「盆栽を登録」 tap → BonsaiCreate 画面
## 5. 樹形選択 row tap → /(modals)/style-picker (formSheet) 表示
## 6. 「直幹 (chokkan)」 tap → router.back() で BonsaiCreate に戻る
##
## 実機実行コマンド (3 回反復で 5/5 実証済、業界標準、retro 2026-05-13 update、ADR-0024 §Notes):
##   for i in 1 2 3; do maestro test maestro/flows/g1-style-picker.yml; done
appId: 'com.doooooraku.bonsailog'
---
- launchApp:
    clearState: true

# Dev Client menu → localhost:8081 tap
- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 15000

# Expo Dev Client Continue dialog 自動 dismiss
- pressKey: 'Back'
- waitForAnimationToEnd:
    timeout: 3000

# Onboarding Welcome → 「はじめる」 tap
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# Onboarding Language → ja → next
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# Onboarding Tut1-5 全 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut1'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut2'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut3'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut4'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# 盆栽タブ empty 状態の CTA tap → BonsaiCreate
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000
- tapOn:
    id: 'e2e_home_empty_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# 樹形選択 row tap
- tapOn:
    id: 'e2e_bonsai_create_style_pick'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# style-picker formSheet 表示確認
- assertVisible:
    id: 'e2e_style_picker_screen'

# 直幹 (chokkan) 選択 → router.back()
- tapOn:
    id: 'e2e_style_option_chokkan'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# router.back() で盆栽タブ空 state に戻る (BonsaiCreate も自動 dismiss、空 CTA 再表示で動作確認)
- assertVisible:
    id: 'e2e_home_empty_cta'
