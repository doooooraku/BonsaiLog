## Phase G1 StylePicker formSheet 実機検証 flow (ADR-0024 Provisionally Accepted)
##
## 検証目的: `(modals)/style-picker` (formSheet) が実機で 5/5 安定動作するか確認。
##
## 経路 (空 state、Dev Client 経由起動):
## 1. App 起動 (clearState: true)
## 2. Dev Client menu → localhost:8081 tap でアプリ本体起動 + bundle load
## 3. 盆栽タブ empty CTA「盆栽を登録」tap → BonsaiCreate 画面
## 4. 樹形選択 row tap → /(modals)/style-picker (formSheet) 表示
## 5. style-picker 内で「直幹 (chokkan)」 tap → router.back() で BonsaiCreate に戻る
## 6. 樹形フィールドが pick row として再表示確認
##
## 実機実行コマンド (5 回反復):
##   for i in 1 2 3 4 5; do maestro test maestro/flows/g1-style-picker.yml; done
appId: 'com.doooooraku.bonsailog'
---
- launchApp:
    clearState: true

# Dev Client menu → localhost:8081 tap でアプリ本体起動
- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 15000

# 盆栽タブ empty 状態の CTA tap → BonsaiCreate
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000
- tapOn:
    id: 'e2e_home_empty_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# 樹形選択 row tap
- tapOn:
    id: 'e2e_bonsai_create_style_pick'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# style-picker formSheet 表示確認
- assertVisible:
    id: 'e2e_style_picker_screen'

# 直幹 (chokkan) 選択 → router.back()
- tapOn:
    id: 'e2e_style_option_chokkan'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# BonsaiCreate に戻り、樹形フィールド更新を確認
- assertVisible:
    id: 'e2e_bonsai_create_style_pick'
