# maestro/flows/watering-settings.yml
# F-16 ローカル通知 (Issue #30、ADR-0014 §AC2 / AC9)
# 水やり繰り返し通知の Settings UI 動線確認 (実機検証フロー雛形)。
#
# 注: 時刻 1-5 件の追加 / 削除 / 5 回上限テストは v1.x の Step 5-B 実装と合わせて拡張予定。
# 本フローは AC2-1 / AC9-2 の動線到達 + トグル動作までの基本確認。

appId: 'com.doooooraku.bonsailog'
name: 'F-16 - watering settings reach'
tags:
  - f-16

steps:
  - launchApp:
      label: 'アプリ起動'
  - tapOn:
      text: '設定'
      label: '設定タブ or ヘッダーから設定画面へ遷移'
      optional: true
  - assertVisible:
      id: 'e2e_settings_screen'
      label: '設定画面が表示されることを確認'
      optional: true
  # Phase 1.6-T6 A2a (Issue #330): 通知 toggle はサブ画面 /settings/notifications に集約済
  - tapOn:
      id: 'e2e_settings_notifications_row'
      label: '「通知設定 ›」 行タップで通知設定サブ画面へ遷移'
      optional: true
  - assertVisible:
      id: 'e2e_notif_watering_toggle_row'
      label: '水やり繰り返し通知トグル row が表示されることを確認'
      optional: true
  - tapOn:
      id: 'e2e_notif_watering_toggle'
      label: '水やり繰り返し通知トグルをタップ (OS 許可リクエスト → ON)'
      optional: true
  # ON 状態確認 (再度トグルすると OFF に戻る、状態保持は AC9-1〜3 で確認)
  - assertVisible:
      id: 'e2e_notif_watering_toggle'
      label: '水やりトグルがタップ後も表示されている (状態が描画されている)'
      optional: true
