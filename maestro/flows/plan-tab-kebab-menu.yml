# maestro/flows/plan-tab-kebab-menu.yml
# Sess26 PR-η-4 (ADR-0036 D7): group 行 右端 kebab (⋮) tap → RowActionMenu
# planned: 「削除」 (destructive) + 「全 {count} 件を記録」
# logged: 「削除」 のみ
appId: 'com.doooooraku.bonsailog'
---
- launchApp:
    clearState: false

- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

- pressKey: 'Back'
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_home_list'
    timeout: 20000

- tapOn:
    text: '予定'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 10000

# planned group 行 右端 kebab (⋮) icon tap → RowActionMenu 表示
- tapOn:
    id: 'e2e_plan_group_kebab_planned_watering'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# RowActionMenu bottom sheet 表示 + items 表示確認
- assertVisible:
    id: 'e2e_plan_kebab_menu'

# planned section の 1st item「削除」 tap (destructive 赤)
- tapOn:
    id: 'e2e_plan_kebab_delete_watering'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# ConfirmDialog 表示 → キャンセル tap で dismiss (副作用なし、 menu 動線のみ verify)
- assertVisible:
    id: 'e2e_plan_confirm_delete'
- tapOn:
    id: 'e2e_plan_confirm_delete_cancel'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000
