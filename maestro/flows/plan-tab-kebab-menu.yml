# maestro/flows/plan-tab-kebab-menu.yml
# Sess27 PR-7 (ADR-0036 D7 拡張): group 行 + 個別 row 右端 kebab (⋮) tap → RowActionMenu / ConfirmDialog
# planned: 「削除」 (destructive) + 「全 {count} 件を記録」
# logged: 「削除」 のみ
# Dev Client 環境では URL list 経由で bundle 読込が必要 (Sess27 PR-7 改修)
appId: 'com.dooooraku.bonsailog'
---
- launchApp:
    clearState: false

# Dev Client URL list (初回 launch時のみ): bundle 読込を tap で起動
- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 30000

# bundle 読込完了後 home list 表示確認
- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_home_list'
    timeout: 30000

- tapOn:
    text: '予定'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 10000

# planned group 行 右端 kebab (⋮) icon tap → RowActionMenu 表示
- tapOn:
    id: 'e2e_plan_group_kebab_planned_watering'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# RowActionMenu bottom sheet 表示 + items 表示確認
- assertVisible:
    id: 'e2e_plan_kebab_menu'

# planned section の 1st item「削除」 tap (destructive 赤)
- tapOn:
    id: 'e2e_plan_kebab_delete_watering'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# ConfirmDialog 表示 → キャンセル tap で dismiss (副作用なし、 menu 動線のみ verify)
- assertVisible:
    id: 'e2e_plan_confirm_delete'
- tapOn:
    id: 'e2e_plan_confirm_delete_cancel'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000
