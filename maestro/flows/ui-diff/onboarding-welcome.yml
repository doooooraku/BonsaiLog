## UI diff capture: onboarding-welcome
##
## ADR-0021 / ADR-0020 §Notes §画面マップ / ADR-0018 (オンボ統合フロー)
## 対象実装: app/onboarding/welcome.tsx (testID e2e_onboarding_welcome_cta)
## 対象モックアップ: docs/mockups/v1.0/wireframes/01-Onboarding.html [data-screen-label="02 Welcome"]
##
## 経路 (clearState で onboarding reset → Welcome 画面到達、シンプル化):
## 1. App 起動 (clearState: true、AsyncStorage クリア → onboarding.completed=false → Welcome 自動表示)
## 2. Dev Client menu → localhost:8081 tap + bundle load
## 3. Continue dialog 自動 dismiss
## 4. Welcome 画面到達確認 (e2e_onboarding_welcome_cta testID)
## 5. waitForAnimationToEnd (価値訴求 3 件のアニメ確定)
##
## 2 回反復 2/2 PASS 基準 (2026-05-13 user 指示)。
## 旧 flow の「設定タブ DEV reset」 経由は clearState で代替 (シンプル化)。
##
## 前提:
##   - 別途 Metro bundler (pnpm dev) 起動済 + adb reverse tcp:8081 tcp:8081
##   - 実機が __DEV__ ビルド (Expo Dev Client)

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: onboarding-welcome'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

# Dev Client URL prompt は dev build でのみ表示。preview build では存在しないので conditional。
# Back キーは preview build では app exit を起こすため、必ず URL prompt visible 時だけ実行する。
- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

# Welcome 画面到達 (clearState で onboarding.completed=false、Welcome 自動表示)
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000

# 価値訴求 3 件のアニメ / レイアウト確定を待つ
- waitForAnimationToEnd
