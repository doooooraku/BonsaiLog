## UI diff capture: bonsai-select-mode (Sess1 PR-3)
##
## ADR-0020 §Notes §画面マップ row 5 (HomeScreen) 選択モード
## 盆栽カード長押し → 選択モード突入 + SelectionToolbar 表示 capture
## mockup: bonsai-select-mode.png (「01A HOME 選択モード」)
## testID: e2e_bonsai_card_{id} (動的) + e2e_home_selection_toolbar_schedule

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: bonsai-select-mode'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

- pressKey: 'Back'
- waitForAnimationToEnd

# Welcome → 「はじめる」 → Language
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 90000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Language ja 選択 → Next → tut5
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# tut5 (Notification) skip → ホーム
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_tut_skip_tut5'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 盆栽タブ Empty 状態到達確認
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ → seed 投入
- tapOn:
    id: 'e2e_tab_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 盆栽タブ → 盆栽カード長押し → 選択モード突入
- tapOn:
    id: 'e2e_tab_bonsai'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_card_.*'
    timeout: 30000
- longPressOn:
    id: 'e2e_bonsai_card_.*'

- waitForAnimationToEnd

# SelectionToolbar 表示確認 (capture 対象、action なし)
- extendedWaitUntil:
    visible:
      id: 'e2e_home_selection_toolbar_schedule'
    timeout: 10000

- waitForAnimationToEnd
