## UI diff capture: wiring-list
##
## ADR-0021 / ADR-0020 §Notes §画面マップ row 15 (針金がけ一覧 ⟷ care-screens.jsx WiringListScreen)
## 対象実装: app/(tabs)/plan/wiring.tsx (testID e2e_wiring_list_screen)
## 対象モックアップ: docs/mockups/v1.0/wireframes/02-Home.html [data-screen-label="11 ケア 針金がけ一覧"]
##
## 経路 (clearState + Onboarding skip + DEV seed 自動投入 + 予定タブ → 針金がけ一覧 link tap):
## 1. App 起動 (clearState: true)
## 2. Dev Client menu + Continue dismiss
## 3. Onboarding skip
## 4. 盆栽タブ Empty CTA visible
## 5. 設定タブ → DEV seed button tap → Alert dismiss (wiring events 「父の黒松」「母の五葉松」 投入)
## 6. 予定タブ tap (e2e_tab_plan)
## 7. e2e_plan_screen 待ち
## 8. e2e_plan_open_wiring scroll + tap
## 9. e2e_wiring_list_screen 表示確認
##
## 2 回反復 2/2 PASS 基準 (2026-05-13 user 指示)。

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: wiring-list'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

# Onboarding Welcome → 「はじめる」
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Language → ja → next
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Tut1-5 全 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ Empty CTA visible 確認
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ tap (seed 投入用)
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# DEV seed button scroll + tap
- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    speed: 40
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Alert dismiss (OS 標準 dialog、R-31 例外)
- tapOn:
    text: 'OK'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# ふりかえりタブ tap (testID 経由、PR #462 で plan-tab の e2e_plan_open_wiring link 削除済、
# 現経路は look-back hub の e2e_look_back_card_wiring 経由)
- tapOn:
    id: 'e2e_tab_look_back'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# CareHub Hub 画面 visible
- extendedWaitUntil:
    visible:
      id: 'e2e_look_back_hub'
    timeout: 10000

# 「針金がけ一覧」 card tap (look-back hub 3 card のうち wiring)
- tapOn:
    id: 'e2e_look_back_card_wiring'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 針金がけ一覧画面表示確認
- extendedWaitUntil:
    visible:
      id: 'e2e_wiring_list_screen'
    timeout: 30000

- waitForAnimationToEnd
