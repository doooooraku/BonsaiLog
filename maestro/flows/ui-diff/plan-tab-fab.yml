## UI diff capture: plan-tab-fab (ADR-0025 Phase 2 案 B、 Sess8 PR-2 #546)
##
## 対象実装: app/(tabs)/plan/index.tsx の右下 FAB (testID e2e_plan_fab_action)
##           → app/(modals)/bonsai-multi-select.tsx (testID e2e_bonsai_multi_select_screen)
##
## 経路 (clearState + Onboarding skip + seed 投入 + 予定タブ → FAB → modal):
## 1. launchApp (clearState: true)
## 2. Dev Client menu + Continue dismiss (template 標準)
## 3. Onboarding skip (Welcome → Language ja → Tut5)
## 4. 盆栽タブ Empty CTA visible 確認
## 5. 設定 (Header Cog 経由 = Phase 1c 動線) → seedTestData → 盆栽タブ
## 6. 予定タブ tap (e2e_tab_plan)
## 7. e2e_plan_screen 表示確認 (月カレンダー、 案 B = 画面切替維持)
## 8. FAB tap (e2e_plan_fab_action)
## 9. e2e_bonsai_multi_select_screen 表示確認 (modal 起動、 mode='schedule')
##
## 2 回反復 2/2 PASS 基準 (R-30、 user 指示)。

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: plan-tab-fab'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

# Onboarding Welcome
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Language ja
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Tut5 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ Empty CTA visible 確認
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定 (Header Cog 経由 = Phase 1c 動線、 settings タブ廃止後)
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# DEV seed button scroll + tap
- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    speed: 40
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Alert dismiss
- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 盆栽タブに戻る
- tapOn:
    id: 'e2e_tab_bonsai'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: 'お師匠の真柏'
    timeout: 30000

# 予定タブ tap (testID 経由)
- tapOn:
    id: 'e2e_tab_plan'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 予定タブ画面表示確認 (案 B = 月カレンダー画面表示)
- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 30000
- waitForAnimationToEnd

# FAB tap → bonsai-multi-select modal 起動
- tapOn:
    id: 'e2e_plan_fab_action'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# bonsai-multi-select modal 表示確認 (capture 対象画面)
- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_multi_select_screen'
    timeout: 30000

- waitForAnimationToEnd
