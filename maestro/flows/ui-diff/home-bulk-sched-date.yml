## UI diff capture: home-bulk-sched-date
##
## ADR-0020 §Notes §画面マップ row 5 (HomeScreen)、mockup v1.0 「01d 一括予定・日付」
## PoC flow g3b-bulk-schedule-date.yml ベースで ui-diff 用に書き直し (clearState + Onboarding skip + seed)。
## 旧 flow (openLink + 「盆栽手帳」 text マッチ) は seed なし state で fail のため Sess 2 で全面更新。
##
## 経路:
## 1. App 起動 (clearState) + Dev Client + Onboarding skip
## 2. 設定タブ → DEV seed → 盆栽タブ
## 3. 「お師匠の真柏」 長押し → selectMode (1 件選択)
## 4. SelectionToolbar 「予定追加」 tap → /bulk-work-picker (formSheet)
## 5. fertilizing (施肥) tap → /bulk-schedule-date (formSheet 表示)
## 6. e2e_bulk_schedule_date_screen + e2e_bulk_schedule_save_cta visible で capture

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: home-bulk-sched-date (Sess 2 PoC flow 転用)'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

- pressKey: 'Back'
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ tap (seed 投入用)
- tapOn:
    id: 'e2e_tab_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# DEV seed button scroll + tap
- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    speed: 40
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Alert dismiss
- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 盆栽タブに戻る
- tapOn:
    id: 'e2e_tab_bonsai'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# お師匠の真柏 visible 確認
- extendedWaitUntil:
    visible:
      text: 'お師匠の真柏'
    timeout: 30000

# 長押しで selectMode 入り
- longPressOn:
    text: 'お師匠の真柏'
- waitForAnimationToEnd

# SelectionToolbar 「予定追加」 tap → /bulk-work-picker
- extendedWaitUntil:
    visible:
      id: 'e2e_home_selection_toolbar_schedule'
    timeout: 10000
- tapOn:
    id: 'e2e_home_selection_toolbar_schedule'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# bulk-work-picker formSheet 表示確認
- extendedWaitUntil:
    visible:
      id: 'e2e_bulk_work_picker_screen'
    timeout: 10000

# fertilizing (施肥) tap → /bulk-schedule-date へ自動遷移
- tapOn:
    id: 'e2e_bulk_work_picker_fertilizing'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# bulk-schedule-date formSheet 表示確認 (capture 対象)
- extendedWaitUntil:
    visible:
      id: 'e2e_bulk_schedule_date_screen'
    timeout: 10000
- assertVisible:
    id: 'e2e_bulk_schedule_save_cta'

- waitForAnimationToEnd
