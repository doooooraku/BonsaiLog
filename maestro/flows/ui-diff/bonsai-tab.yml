# UI diff: 盆栽タブ画面のスクリーンショット取得用
# ADR-0021 / ADR-0020 §Decision §3 (盆栽タブ ⟷ home-screens.jsx HomeScreen)
# 本 flow は scripts/ui-diff/capture-app.sh から呼ばれる。
# スクショ取得自体は flow 完了後にシェル側で adb exec-out screencap で行う。

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: bonsai-tab'
tags:
  - ui-diff
---
# 1. Metro server (WSL の :8081) に接続したアプリ画面を直接開く
#    前提: 別途 Metro bundler (pnpm dev) を起動済み、`adb reverse tcp:8081 tcp:8081`
#         で実機から WSL ポートに到達可能にしてある。
#    NOTE: 'exp://' は実機にインストール済の Expo Go (古いバージョン) が拾ってしまうため、
#          BonsaiLog 専用の 'bonsailog://expo-development-client/?url=...' で
#          Dev Launcher を直接呼ぶ (Expo SDK 50+ の deep link ハンドリング)。
- openLink: 'bonsailog://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081'

# 2. ヘッダー「盆栽手帳」が表示されるまで待つ
#    Metro 初回バンドルが 30-60 秒かかるため timeout を 60000ms に拡張。
- extendedWaitUntil:
    visible:
      text: '盆栽手帳'
    timeout: 60000
    label: 'Metro バンドル + アプリ起動完了 (初回 60s 許容)'

# 3. リスト / フィルタ描画完了を待つ
- waitForAnimationToEnd
