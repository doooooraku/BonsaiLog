# UI diff: 一括予定追加・作業選択 BottomSheet のスクリーンショット取得用
# ADR-0020 §Notes §画面マップ row 5、mockup v1.0 02-Home.html `01c 一括予定・作業選択`
# Sess1 PR-4 (2026-05-17): Onboarding 経由 + seed 投入 + 盆栽カード長押し → 予定追加

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: home-bulk-sched-work'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 90000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_tut_skip_tut5'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ → seed 投入 (盆栽カード必要)
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 盆栽タブ → 1 件目カード長押し → SelectionToolbar → 予定追加
- tapOn:
    id: 'e2e_tab_bonsai'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_card_.*'
    timeout: 30000
- longPressOn:
    id: 'e2e_bonsai_card_.*'

- waitForAnimationToEnd

- tapOn:
    id: 'e2e_home_selection_toolbar_schedule'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# BulkWorkPickerScreen 表示 (capture 対象、ADR-0024 Phase G で Sheet→Screen 化、Sess2 PR-4 で rename 漏れ修正)
- extendedWaitUntil:
    visible:
      id: 'e2e_bulk_work_picker_screen'
    timeout: 10000

- waitForAnimationToEnd
