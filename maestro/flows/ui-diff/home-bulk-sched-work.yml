# UI diff: 一括予定追加・作業選択 BottomSheet のスクリーンショット取得用
# ADR-0020 §Notes §画面マップ row 5、mockup v1.0 02-Home.html `01c 一括予定・作業選択`
# Sess1 PR-4 (2026-05-17): Onboarding 経由 + seed 投入 + 盆栽カード長押し → 予定追加

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: home-bulk-sched-work'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

# clearState で Dev Client が Metro 接続先をリセット → 2 パターン対応:
# (A) 「http://localhost:8081」 が直接見える → tap して Continue
# (B) 「Fetch development servers」 画面 → tap → localhost:8081 を選択
- runFlow:
    when:
      visible:
        text: 'Fetch development servers'
    commands:
      - tapOn:
          text: 'Fetch development servers'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            text: 'http://localhost:8081'
          timeout: 15000
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 90000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# tut1 の skip ボタンで全 step を一括スキップ (clearState で全 step 未完、tut1 → handleSkipAll → home)
# tut5 に到達していた場合もカバーするため両方を optional で試みる
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut1'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ → seed 投入 (盆栽カード必要)
# Expo toolsButton バグ対策 (clearState: true で tools button 復活、
# 設定アイコン座標と重なるため Dev Tools が開く場合がある):
# → tools button を OFF にして閉じ、settings を再タップする
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: 'Toggle performance monitor'
    commands:
      - tapOn:
          text: 'Tools button'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd
      - tapOn:
          id: 'e2e_bonsai_home_settings'
          retryTapIfNoChange: true
      - waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# settings header の ← back button をタップして nav back
# (pressKey Back が ScrollView の scroll-to-top に消費されるため)
# ← は画面上部左端 (おおよそ 7%, 7%) に位置する
- tapOn:
    point: '7%, 7%'
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_tab_bonsai'
    timeout: 30000

# Sess8 PR-5 以降の新経路:
# 盆栽カード長押し → selectMode 経路は廃止
# 予定タブ FAB → bonsai-multi-select modal → 盆栽選択 → 確定 → bulk-work-picker
- tapOn:
    id: 'e2e_tab_plan'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_plan_fab_action'
    timeout: 15000

- tapOn:
    id: 'e2e_plan_fab_action'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# bonsai-multi-select modal (2+ 盆栽 → modal 起動)
- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_multi_select_screen'
    timeout: 15000

# 最初の盆栽カードを選択
- tapOn:
    id: 'e2e_bonsai_multi_select_card_.*'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 確定 → /bulk-work-picker?mode=schedule
- tapOn:
    id: 'e2e_bonsai_multi_select_confirm'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# BulkWorkPickerScreen 表示 (capture 対象)
- extendedWaitUntil:
    visible:
      id: 'e2e_bulk_work_picker_screen'
    timeout: 15000

- waitForAnimationToEnd
