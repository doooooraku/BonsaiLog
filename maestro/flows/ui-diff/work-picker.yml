## UI diff capture: work-picker
##
## ADR-0024 g2 / mockup v1.0 「03 作業選択 BottomSheet」
## g2-work-picker.yml ベースで ui-diff 用に書き直し (formSheet 表示中で stop + capture)。
## Issue #522 影響なし想定 (bonsai detail screen → formSheet、modal 親なし)。

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: work-picker'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_tab_bonsai'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# お師匠の真柏 tap → bonsai detail
- extendedWaitUntil:
    visible:
      text: 'お師匠の真柏'
    timeout: 30000
- tapOn:
    text: 'お師匠の真柏'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 履歴タブ FAB tap → work-picker formSheet
- extendedWaitUntil:
    visible:
      id: 'e2e_history_bottom_cta'
    timeout: 10000
- tapOn:
    id: 'e2e_history_bottom_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# work-picker formSheet 完全表示確認 + capture 用 wait
- extendedWaitUntil:
    visible:
      id: 'e2e_work_picker_screen'
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: 'e2e_work_picker_grid'
    timeout: 10000

- waitForAnimationToEnd
