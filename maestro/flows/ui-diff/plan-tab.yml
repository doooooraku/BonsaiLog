## UI diff capture: plan-tab
##
## ADR-0021 / ADR-0020 §Notes §画面マップ row 14 (予定タブ ⟷ care-screens.jsx CalendarScreen)
## 対象実装: app/(tabs)/plan/index.tsx (testID e2e_plan_screen)
## 対象モックアップ: docs/mockups/v1.0/wireframes/02-Home.html [data-screen-label="10 ケア 作業予定カレンダー"]
##
## 経路 (clearState + Onboarding skip + DEV seed 自動投入 + 予定タブ tap):
## 1. App 起動 (clearState: true)
## 2. Dev Client menu + Continue dismiss
## 3. Onboarding skip
## 4. 盆栽タブ Empty CTA visible
## 5. 設定タブ → DEV seed button tap → Alert dismiss
## 6. 予定タブ tap (e2e_tab_plan)
## 7. e2e_plan_screen 表示確認
##
## 2 回反復 2/2 PASS 基準 (2026-05-13 user 指示)。

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: plan-tab'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 15000

- pressKey: 'Back'
- waitForAnimationToEnd:
    timeout: 3000

# Onboarding Welcome
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# Language ja
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# Tut1-5 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut1'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut2'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut3'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut4'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# 盆栽タブ Empty CTA visible 確認
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ tap (seed 投入用)
- tapOn:
    id: 'e2e_tab_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# DEV seed button scroll + tap
- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    speed: 40
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# Alert dismiss (R-31 例外)
- tapOn:
    text: 'OK'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# 予定タブ tap (testID 経由)
- tapOn:
    id: 'e2e_tab_plan'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

# 予定タブ画面表示確認
- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 30000

- waitForAnimationToEnd:
    timeout: 3000
