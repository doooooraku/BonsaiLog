# UI diff: 一括予定追加・作業選択 BottomSheet — 盆栽 7 件選択時の chip 折り返し確認用
# home-bulk-sched-work.yml の共通経路を踏襲し、多選択時の chip wrap を撮影する

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: home-bulk-sched-work-7bonsai'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'Fetch development servers'
    commands:
      - tapOn:
          text: 'Fetch development servers'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            text: 'http://localhost:8081'
          timeout: 15000
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 90000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_onboarding_tut_skip_tut1'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: 'Toggle performance monitor'
    commands:
      - tapOn:
          text: 'Tools button'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd
      - tapOn:
          id: 'e2e_bonsai_home_settings'
          retryTapIfNoChange: true
      - waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    point: '7%, 7%'
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_tab_bonsai'
    timeout: 30000

- tapOn:
    id: 'e2e_tab_plan'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_plan_fab_action'
    timeout: 15000

- tapOn:
    id: 'e2e_plan_fab_action'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_multi_select_screen'
    timeout: 15000

# 盆栽 7 件を選択 (index 0〜6 で上から順に選択)
- tapOn:
    id: 'e2e_bonsai_multi_select_card_.*'
    index: 0
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_bonsai_multi_select_card_.*'
    index: 1
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_bonsai_multi_select_card_.*'
    index: 2
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_bonsai_multi_select_card_.*'
    index: 3
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_bonsai_multi_select_card_.*'
    index: 4
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_bonsai_multi_select_card_.*'
    index: 5
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_bonsai_multi_select_card_.*'
    index: 6
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 確定 → /bulk-work-picker?mode=schedule
- tapOn:
    id: 'e2e_bonsai_multi_select_confirm'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# BulkWorkPickerScreen 表示 (capture 対象 — chip 7 件折り返し確認)
- extendedWaitUntil:
    visible:
      id: 'e2e_bulk_work_picker_screen'
    timeout: 15000

- waitForAnimationToEnd
