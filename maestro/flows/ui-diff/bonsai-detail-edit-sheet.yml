# UI diff: 盆栽編集 BottomSheet (PR #378 編集モード対応)
# ADR-0021 / mockups v1.0 「03 新規登録 / 編集」
# Sess1 PR-4 (2026-05-17): Onboarding 経由 + seed 投入 + カード tap → 基本情報 → 編集ボタン

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: bonsai-detail-edit-sheet'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 90000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_tut_skip_tut5'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ → seed 投入 (盆栽カード必要)
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 盆栽タブ → 1 件目カード tap → 詳細画面
- tapOn:
    id: 'e2e_tab_bonsai'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: 'お師匠の真柏'
    timeout: 30000
- tapOn:
    text: 'お師匠の真柏'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: '基本情報'
    timeout: 30000

# 基本情報タブ tap
- tapOn:
    text: '基本情報'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 編集ボタン (画面下端) を scrollUntilVisible で可視化してから tap
- scrollUntilVisible:
    element:
      id: 'e2e_detail_basic_edit_button'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_detail_basic_edit_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# BonsaiCreateSheet edit モード起動 (capture 対象)
- extendedWaitUntil:
    visible:
      text: '名前'
    timeout: 15000

- waitForAnimationToEnd
