---
# UI diff: 盆栽編集 BottomSheet (PR #378 編集モード対応)
# ADR-0021 / mockups v1.0 「03 新規登録 / 編集」 (create-screens.jsx CreateBonsaiScreen prefill モード)
#
# 前提:
#   - 別途 Metro bundler (pnpm dev) 起動済 + adb reverse tcp:8081 tcp:8081
#   - テスト盆栽 1 件以上登録済 (盆栽カード長押し用)
#
# 流れ: 起動 → 盆栽タブ → カード tap → 詳細画面 → 基本情報タブ → 編集ボタン → BonsaiCreateSheet edit モード

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: bonsai-detail-edit-sheet'
tags:
  - ui-diff
---
- openLink: 'bonsailog://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081'

- extendedWaitUntil:
    visible:
      text: '盆栽手帳'
    timeout: 60000
    label: 'Metro バンドル + 盆栽タブ表示完了 (初回 60s 許容)'

- waitForAnimationToEnd

# 最初の盆栽カードを tap (テスト盆栽 1 件以上前提、bonsai-detail.yml と同じ座標)
- tapOn:
    point: 50%,30%

- extendedWaitUntil:
    visible:
      text: '基本情報'
    timeout: 30000
    label: 'Detail 画面遷移完了 (Tabs 表示)'

- waitForAnimationToEnd

# 基本情報タブをタップ (現在 history タブ active)
- tapOn:
    text: '基本情報'

- waitForAnimationToEnd

# 「編集」ボタンを tap (testID e2e_detail_basic_edit_button、PR #378 で配線済)
- tapOn:
    id: 'e2e_detail_basic_edit_button'

# BottomSheet edit モード起動 → 名前フィールドが prefill 済で表示されるまで待つ
- extendedWaitUntil:
    visible:
      text: '名前'
    timeout: 15000
    label: 'BonsaiCreateSheet edit モード開く (prefill 済 名前フィールド表示)'

- waitForAnimationToEnd
