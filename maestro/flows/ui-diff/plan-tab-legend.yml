## UI diff capture: plan-tab-legend (Sess22 ADR-0034 D1)
##
## カレンダー凡例 collapsible bar の toggle + AsyncStorage 永続化検証。
##
## 経路:
## 1. plan-tab.yml と同じ前処理 (clearState + Onboarding skip + DEV seed + 予定タブ tap)
## 2. e2e_plan_legend visible 確認 (初回 = 展開状態)
## 3. e2e_plan_legend_toggle tap → 折りたたみ確認 (e2e_plan_legend_item_logged が hidden)
## 4. 再度 tap → 展開確認
##
## R-31 整合: _template.yml 由来、 tapOn text 不使用、 3 回反復 3/3 PASS 基準。

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: plan-tab-legend (Sess22)'
tags:
  - ui-diff
  - sess22
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

# Onboarding Welcome
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Language ja
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Tut1-5 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ Empty CTA visible 確認
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ tap (seed 投入用)
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# DEV seed button scroll + tap
- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    speed: 40
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Alert dismiss (R-31 例外)
- tapOn:
    text: 'OK'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 予定タブ tap
- tapOn:
    id: 'e2e_tab_plan'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 予定タブ画面表示確認
- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 30000
- waitForAnimationToEnd

# 凡例 bar 初回 = 展開状態 (default false)
- extendedWaitUntil:
    visible:
      id: 'e2e_plan_legend'
    timeout: 5000
- assertVisible:
    id: 'e2e_plan_legend_item_logged'
- assertVisible:
    id: 'e2e_plan_legend_item_planned'
- assertVisible:
    id: 'e2e_plan_legend_item_multiple'

# Toggle tap → 折りたたみ
- tapOn:
    id: 'e2e_plan_legend_toggle'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 折りたたみ状態: legend root は visible (header だけ表示)、 items は hidden
- assertVisible:
    id: 'e2e_plan_legend'
- assertNotVisible:
    id: 'e2e_plan_legend_item_logged'

# Toggle tap → 再展開
- tapOn:
    id: 'e2e_plan_legend_toggle'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- assertVisible:
    id: 'e2e_plan_legend_item_logged'
