## Maestro E2E: BulkWorkPicker 1 件 case mode=schedule fixture (Sess86 起票、 PR #1019 R-71 plan 動線 regression 防止)
##
## 目的:
##   bulk-work-picker-1bonsai.yml (= log mode) と同型で、 予定 tab BottomCtaBar 経由の
##   mode=schedule 1 件 case で chip ✓ + 「自動選択」 hint の regression 構造防止。
##
## 動線:
##   1. clearState で 0 件 state 開始
##   2. Dev Client + Onboarding skip
##   3. 空状態 CTA tap → BonsaiCreate → name input「TestBonsai」 + submit
##   4. 1 件 state 確立
##   5. 予定 tab tap (e2e_tab_plan) → 予定 screen
##   6. BottomCtaBar action (e2e_plan_bottom_cta_action) tap
##   7. BulkWorkPicker mode=schedule 1 件 case 到達確認
##   8. ★ assertVisible: e2e_bulk_work_picker_auto_selected_hint ★

appId: 'com.dooooraku.bonsailog'
name: 'BulkWorkPicker 1 件 case fixture (schedule mode、 R-71 regression 防止)'
tags:
  - ui-diff
  - regression
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_onboarding_tut_skip_tut1'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut2'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut3'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut4'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ 空状態 → BonsaiCreate
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000
- tapOn:
    id: 'e2e_home_empty_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_create_screen'
    timeout: 10000

- tapOn:
    id: 'e2e_bonsai_create_name'
    retryTapIfNoChange: true
- inputText: 'TestBonsai'
- hideKeyboard
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'e2e_bonsai_create_submit'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 30
- tapOn:
    id: 'e2e_bonsai_create_submit'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: 'TestBonsai'
    timeout: 15000

# 予定 tab tap → BottomCtaBar tap
- tapOn:
    id: 'e2e_tab_plan'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 15000

- tapOn:
    id: 'e2e_plan_bottom_cta_action'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# BulkWorkPicker mode=schedule 1 件 case 到達確認
- extendedWaitUntil:
    visible:
      id: 'e2e_bulk_work_picker_screen'
    timeout: 10000

# ★ R-71 改修 regression 防止 assertion ★
- assertVisible:
    id: 'e2e_bulk_work_picker_auto_selected_hint'
