## UI diff capture: bonsai-create-sheet
##
## PR #493 (Phase G4 part 2) で BonsaiCreate を @gorhom BottomSheet → presentation: 'modal' に置換。
## 本 flow は modal 化後の screen を screenshot キャプチャするため g4-bonsai-new.yml 経路を踏襲。
##
## 経路 (clearState + Onboarding skip + 空 state CTA):
## 1. App 起動 (clearState: true、seed 0 件で OK)
## 2. Dev Client menu → localhost:8081 tap + bundle load
## 3. Continue dialog 自動 dismiss
## 4. Onboarding skip (Welcome → Language ja → Tut1-5)
## 5. 盆栽タブ Empty CTA tap → (modals)/bonsai-new (modal)
## 6. modal 表示確認 (e2e_bonsai_create_screen)
## 7. scrollUntilVisible で submit 表示 (= keyboard dismiss、画面下半分の form を見える状態にする)
##
## R-31 適用済 (testID 事前 grep + _template.yml ベース + tapOn:text 禁止)。
## 注: scrollUntilVisible visibilityPercentage 30 は modal 内 keyboard dismiss の正解 (pressKey:Back / hideKeyboard は modal close リスク、PR #493 教訓)。

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: bonsai-create-sheet (modal、PR #493 後)'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

# Onboarding Welcome → 「はじめる」 tap
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Language → ja → next
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Tut1-5 全 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ Empty CTA tap → /bonsai-new modal
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000
- tapOn:
    id: 'e2e_home_empty_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# bonsai-new modal 表示確認 (R-31 testID 経由)
- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_create_screen'
    timeout: 10000

# UI diff capture 専用: modal 開いた瞬間の screenshot 取得が目的。
# scrollUntilVisible は 2 回反復 0/2 で flaky (over-shoot or 検出困難) のため削除。
# keyboard 表示状態の screenshot は R-25 評価で「キーボード状態の許容差」 として扱う。
# (g4-bonsai-new.yml 操作系 flow は scrollUntilVisible 使用、capture 系は別運用)
- waitForAnimationToEnd
