# UI diff: Paywall モーダルのスクリーンショット取得用
# ADR-0021 / ADR-0020 §Notes §画面マップ row 17 (Paywall ⟷ monetization-screens.jsx PaywallScreen)
# 対象実装: src/features/pro/PaywallScreen.tsx + app/pro.tsx (薄ラッパー、testID e2e_paywall_screen)
# 対象モックアップ: docs/mockups/v1.0/wireframes/05-Monetization.html [data-screen-label="01 Paywall Modal"]
#
# 前提:
#   - 別途 Metro bundler (pnpm dev) を WSL2 内で起動済み、`adb reverse tcp:8081 tcp:8081` で
#     実機から WSL ポートに到達可能。
#   - オンボ完了済 + 設定タブの「Proにアップグレード」リンクから遷移。
#   - データ依存なし (Free / Pro 状態どちらでも paywall 自体は表示可能、本 PoC は Free 想定)。
#
# R-28 境界判定:
#   - UI 表現 (Paywall 表示 / レイアウト / コピー) のみ
#   - ビジネス仕様 (RevenueCat ロジック、月額/年額/Lifetime プラン定義) は ADR-0009 維持

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: paywall'
tags:
  - ui-diff
---
# 1. Metro server (WSL の :8081) に接続したアプリ画面を直接開く
- openLink: 'bonsailog://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081'

# 2. 起動完了 (盆栽タブの「盆栽手帳」ヘッダー) を待つ
- extendedWaitUntil:
    visible:
      text: '盆栽手帳'
    timeout: 60000

# 3. TabBar の「設定」タブをタップ
- tapOn:
    text: '設定'

# 4. 設定タブの ThemedView (testID e2e_settings_screen) が表示されるまで待つ
- extendedWaitUntil:
    visible:
      id: 'e2e_settings_screen'
    timeout: 30000

- waitForAnimationToEnd

# 5. 「Proにアップグレード」または「Pro にアップグレード」ボタンをタップ
- tapOn:
    id: 'e2e_open_paywall'

# 6. Paywall ScrollView (testID e2e_paywall_screen) が表示されるまで待つ
- extendedWaitUntil:
    visible:
      id: 'e2e_paywall_screen'
    timeout: 30000

# 7. Paywall 全体描画完了を待つ
- waitForAnimationToEnd
