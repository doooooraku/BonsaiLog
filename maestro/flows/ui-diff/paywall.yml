## UI diff capture: paywall
##
## ADR-0021 / ADR-0020 §Notes §画面マップ row 17 (Paywall ⟷ monetization-screens.jsx PaywallScreen)
## 対象実装: src/features/pro/PaywallScreen.tsx + app/pro.tsx (testID e2e_paywall_screen)
## 対象モックアップ: docs/mockups/v1.0/wireframes/05-Monetization.html [data-screen-label="01 Paywall Modal"]
##
## 経路 (clearState + Onboarding skip + 設定タブ → paywall link tap):
## 1. App 起動 (clearState: true)
## 2. Dev Client menu + Continue dismiss
## 3. Onboarding skip (Welcome → Language ja → Tut1-5)
## 4. 盆栽タブ Empty CTA visible
## 5. 設定タブ tap (e2e_bonsai_home_settings)
## 6. e2e_settings_screen 待ち
## 7. e2e_open_paywall scroll + tap
## 8. e2e_paywall_screen 表示確認
##
## 2 回反復 2/2 PASS 基準 (2026-05-13 user 指示)。
## seed 不要 (paywall は Free / Pro どちらでも表示)。

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: paywall'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

# Onboarding Welcome → 「はじめる」
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Language → ja → next
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Tut1-5 全 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ Empty CTA visible 確認
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ tap (testID 経由、text マッチ「設定」 は Developer Menu 誤起動回避)
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 設定画面 visible
- extendedWaitUntil:
    visible:
      id: 'e2e_settings_screen'
    timeout: 10000

# paywall link scroll + tap
- scrollUntilVisible:
    element:
      id: 'e2e_open_paywall'
    direction: DOWN
    timeout: 15000
    speed: 40
- tapOn:
    id: 'e2e_open_paywall'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Paywall 画面表示確認
- extendedWaitUntil:
    visible:
      id: 'e2e_paywall_screen'
    timeout: 30000

- waitForAnimationToEnd
