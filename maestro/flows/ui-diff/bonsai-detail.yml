## UI diff capture: bonsai-detail
##
## ADR-0021 / ADR-0020 §Notes Amended / detail-screens.jsx BonsaiDetailScreen / app/(tabs)/bonsai/[id]/index.tsx
##
## 経路 (clearState + Onboarding skip + DEV seed 自動投入 + 「父の黒松」 tap):
## 1. App 起動 (clearState: true、AsyncStorage クリア)
## 2. Dev Client menu → localhost:8081 tap + bundle load
## 3. Continue dismiss
## 4. Onboarding skip (Welcome → Language ja → Tut1-5)
## 5. 盆栽タブ Empty CTA visible (e2e_home_empty_cta)
## 6. 設定タブ tap (e2e_tab_settings)
## 7. DEV seed button scroll + tap (e2e_dev_seed_button、seed 3 盆栽 + 写真 + 記録 投入)
## 8. Alert dismiss (text: 'OK' tap、Alert は OS 標準 dialog で testID 不能のため R-31 例外)
## 9. 盆栽タブ tap (e2e_tab_bonsai)
## 10. 「父の黒松」 scrollUntilVisible + tap
## 11. Bonsai detail 表示確認 (e2e_detail_tab_basic タブ)
##
## 2 回反復 2/2 PASS 基準 (2026-05-13 user 指示)。
##
## 前提:
##   - 別途 Metro bundler (pnpm dev) 起動済 + adb reverse tcp:8081 tcp:8081
##   - 実機が __DEV__ ビルド (DEV seed button が表示される)

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: bonsai-detail'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Expo Dev Client Continue dialog 自動 dismiss
- pressKey: 'Back'
- waitForAnimationToEnd

# Onboarding Welcome → 「はじめる」
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Language → ja → next
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Onboarding Tut1-5 全 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut1'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut2'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut3'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut4'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ Empty CTA visible 確認
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ tap
- tapOn:
    id: 'e2e_tab_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# DEV seed button scroll + tap (画面下端の DEV セクション)
- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    speed: 40
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Alert 'テストデータ投入完了' を OK で dismiss (R-31 例外、OS 標準 dialog で testID 不能)
- tapOn:
    text: 'OK'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 盆栽タブに戻る
- tapOn:
    id: 'e2e_tab_bonsai'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 「父の黒松」 (seed 1 件目、cover photo あり) を scrollUntilVisible + tap
- scrollUntilVisible:
    element:
      text: '父の黒松'
    direction: DOWN
    timeout: 15000
    speed: 40
- tapOn:
    text: '父の黒松'
    retryTapIfNoChange: true

# Bonsai detail 表示確認 (Tabs の基本情報 visible)
- extendedWaitUntil:
    visible:
      id: 'e2e_detail_tab_basic'
    timeout: 30000

- waitForAnimationToEnd
