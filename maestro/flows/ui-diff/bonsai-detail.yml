---
# UI diff: 盆栽詳細画面のスクリーンショット取得用
# ADR-0021 / ADR-0020 §Notes Amended (2026-05-09、写真タブ廃止 + basic タブ追加) /
# detail-screens.jsx BonsaiDetailScreen / app/(tabs)/bonsai/[id]/index.tsx
#
# 前提:
#   - 別途 Metro bundler (pnpm dev) を起動済み、`adb reverse tcp:8081 tcp:8081`
#   - seed テストデータ投入済 (盆栽「父の黒松」「母の五葉松」「お師匠の真柏」)
#   - 「父の黒松」が cover photo あり (seed 1 件目)、Hero overlay 表示確認用
#
# 改修 (Phase 1.5 再キャプチャ fallout):
#   - 当初 50%,30% 座標 tap で「お師匠の真柏」(3 件目、photo 無し) を tap してしまい Hero overlay 不可視
#   - text マッチで「父の黒松」を確実に tap して写真ある盆栽の詳細を撮る

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: bonsai-detail'
tags:
  - ui-diff
---
# 1. Metro server (WSL の :8081) に接続したアプリ画面を直接開く
- openLink: 'bonsailog://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081'

# Expo Dev Client の初回起動 dialog を dismiss
- runFlow:
    when:
      visible: 'Continue'
    commands:
      - tapOn: 'Continue'
      - waitForAnimationToEnd

# 2. 盆栽タブの「盆栽手帳」ヘッダーが表示されるまで待つ
- extendedWaitUntil:
    visible:
      text: '盆栽手帳'
    timeout: 60000
    label: 'Metro バンドル + 盆栽タブ表示完了 (初回 60s 許容)'

# BonsaiCard リスト loading 完了待ち
- extendedWaitUntil:
    visible:
      text: 'すべて'
    timeout: 30000

- waitForAnimationToEnd

# 3. 「父の黒松」カード (cover photo あり) を text マッチで tap
#    seed 1 件目「父の黒松」は assets/dev-seed/sample-1.jpg を cover に持つため Hero overlay 表示可能
#    実機の BonsaiCard は updated_at 降順なので 3 件目になり画面下端で not visible のことがある
#    scrollUntilVisible で確実に表示してから tap
- scrollUntilVisible:
    element:
      text: '父の黒松'
    direction: DOWN
    timeout: 15000
    speed: 40

- tapOn:
    text: '父の黒松'

# 4. Detail 画面の Tabs (基本情報 / 作業履歴 / 予定タイムライン) のいずれかが表示されるまで待つ
#    A4 リファクタ完了後の最終形タブ名「基本情報」を可視待ちアンカーに使用
- extendedWaitUntil:
    visible:
      text: '基本情報'
    timeout: 30000
    label: 'Detail 画面遷移完了 (Tabs 表示)'

- waitForAnimationToEnd
