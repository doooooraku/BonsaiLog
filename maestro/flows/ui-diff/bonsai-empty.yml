# UI diff: 盆栽タブ Empty State 画面のスクリーンショット取得用
# ADR-0021 / ADR-0020 §画面マップ (盆栽タブ 0 件 ⟷ home-screens.jsx HomeEmptyScreen)
#
# 前提: Metro bundler 起動済 + adb reverse tcp:8081 tcp:8081
# Onboarding 完了直後の Empty 状態を取得 (seed 投入なし)。

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: bonsai-empty'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

# Welcome → 「はじめる」 → Language
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 90000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# tut5 (Notification) skip → ホーム
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_tut_skip_tut5'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 盆栽タブ Empty State 到達確認 (seed 投入なし、 そのまま empty を capture)
- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_home_empty'
    timeout: 30000

- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 10000

# AdBanner 表示待ち (STARTUP_DELAY_MS = 3 秒 + ロード時間)
- extendedWaitUntil:
    visible:
      id: 'e2e_ad_banner'
    timeout: 15000

- waitForAnimationToEnd
