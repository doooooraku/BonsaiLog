## UI diff capture: work-log-confirm
##
## ADR-0024 g2 / mockup v1.0 「05 作業を記録 (詳細 form)」
## work-picker.yml 経路 + 水やり tap → work-log-confirm formSheet capture。
## formSheet → formSheet (Issue #522 影響なし想定、親が modal ではない)。

appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: work-log-confirm'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- tapOn:
    text: 'http://localhost:8081'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 15000

- pressKey: 'Back'
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    id: 'e2e_onboarding_tut_skip_tut1'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut2'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut3'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut4'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

- tapOn:
    id: 'e2e_tab_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    id: 'e2e_tab_bonsai'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      text: 'お師匠の真柏'
    timeout: 30000
- tapOn:
    text: 'お師匠の真柏'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

- extendedWaitUntil:
    visible:
      id: 'e2e_history_fab'
    timeout: 10000
- tapOn:
    id: 'e2e_history_fab'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# work-picker formSheet 表示確認 → 水やり tap → work-log-confirm formSheet
- extendedWaitUntil:
    visible:
      id: 'e2e_work_picker_screen'
    timeout: 30000
- tapOn:
    id: 'e2e_work_picker_watering'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

# work-log-confirm formSheet 表示確認 (capture 対象)
- extendedWaitUntil:
    visible:
      id: 'e2e_work_log_confirm_screen'
    timeout: 30000

- waitForAnimationToEnd:
    timeout: 5000
