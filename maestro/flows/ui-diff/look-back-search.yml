# UI diff: ふりかえり → 盆栽検索 sub-route のスクリーンショット取得用
# ADR-0021 / ADR-0020 §Notes §画面マップ row 16 (検索画面)
# Sess1 PR-4 (2026-05-17): Onboarding 経由 + seed 投入 + look_back tab → search card → @ベランダ chip

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: look-back-search'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 90000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_tut_skip_tut5'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ → seed 投入 (@ベランダ tag を含む seed 必要)
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# ふりかえりタブ → CareHub → 盆栽検索カード
- tapOn:
    id: 'e2e_tab_look_back'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_look_back_hub'
    timeout: 30000

- tapOn:
    id: 'e2e_look_back_card_search'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_find_screen'
    timeout: 30000

# Sess3 R2-b 修正: tag chip tap 前に「最近のタグ」 セクションが render されるまで wait
# (Sess2 failure 真因: chip tap が初回反応せず、検索結果が表示されないまま assert fail)
- extendedWaitUntil:
    visible:
      id: 'e2e_find_recent_tags'
    timeout: 15000

# @ベランダ tag chip tap → 検索結果リスト出現
- tapOn:
    text: '@ベランダ'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Sess3 R2-b: chip tap 後の DB query + render を 30 秒まで待つ (15 → 30 秒)
- extendedWaitUntil:
    visible:
      id: 'e2e_find_bonsai_section'
    timeout: 30000

- waitForAnimationToEnd
