## Maestro E2E: BulkWorkPicker 1 件 case mode=recurring fixture (Sess86 起票、 PR #1019 R-71 + PR #1020 + Sess86 動線 regression 防止)
##
## 目的:
##   ふりかえり tab → 定期予定管理 → 新規追加 → BulkWorkPicker mode=recurring 1 件 case で
##   chip ✓ + 「自動選択」 hint + Stack header「新規定期予定」 の regression 構造防止。
##
## 動線:
##   1. clearState で 0 件 state 開始
##   2. Dev Client + Onboarding skip
##   3. 空状態 CTA tap → BonsaiCreate → name input「TestBonsai」 + submit
##   4. 1 件 state 確立
##   5. ふりかえり tab tap (e2e_tab_look_back) → LookBackHub
##   6. e2e_look_back_card_recurring tap → RecurrenceListScreen
##   7. e2e_recurrence_list_create_new tap (= 「+ 新規追加」 BottomCtaBar、 PR #1020 改修済)
##   8. useBulkActionFlow が 1 件で 自動選択 + 直接 /bulk-work-picker?mode=recurring push
##   9. BulkWorkPicker 表示 + ★ assertVisible e2e_bulk_work_picker_auto_selected_hint ★

appId: 'com.dooooraku.bonsailog'
name: 'BulkWorkPicker 1 件 case fixture (recurring mode、 R-71 regression 防止)'
tags:
  - ui-diff
  - regression
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    id: 'e2e_onboarding_tut_skip_tut1'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut2'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut3'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut4'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ 空状態 → BonsaiCreate
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000
- tapOn:
    id: 'e2e_home_empty_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_bonsai_create_screen'
    timeout: 10000

- tapOn:
    id: 'e2e_bonsai_create_name'
    retryTapIfNoChange: true
- inputText: 'TestBonsai'
- hideKeyboard
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: 'e2e_bonsai_create_submit'
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 30
- tapOn:
    id: 'e2e_bonsai_create_submit'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: 'TestBonsai'
    timeout: 15000

# ふりかえり tab tap → LookBackHub
- tapOn:
    id: 'e2e_tab_look_back'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_look_back_hub'
    timeout: 15000

# 定期予定を管理 card tap → RecurrenceListScreen
- tapOn:
    id: 'e2e_look_back_card_recurring'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'e2e_recurrence_list_screen'
    timeout: 15000

# 「+ 新規追加」 BottomCtaBar tap (PR #1020 改修済: 「+ 」 prefix 削除)
- tapOn:
    id: 'e2e_recurrence_list_create_new'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# BulkWorkPicker mode=recurring 1 件 case 到達確認
- extendedWaitUntil:
    visible:
      id: 'e2e_bulk_work_picker_screen'
    timeout: 10000

# ★ R-71 改修 regression 防止 assertion ★
- assertVisible:
    id: 'e2e_bulk_work_picker_auto_selected_hint'
