# UI diff: エクスポート Hub 画面 (F-10 / ADR-0016 AC11 Hub)
# 設定 → エクスポート で 5 種類集約 Hub に到達。Free 状態でも PRO バッジ付きで描画される。
#
# 前提: Metro 起動済 + adb reverse tcp:8081 tcp:8081
appId: 'com.doooooraku.bonsailog'
name: 'UI diff capture: export-hub'
tags:
  - ui-diff
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

# Onboarding: Welcome → 言語 → tut5 skip
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 90000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_tut_skip_tut5'
    timeout: 30000
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 設定 → seed 投入 (Hub の遷移先画面に盆栽データがある状態で撮影)
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    text: 'OK'
    optional: true
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 設定 → エクスポート Hub
- scrollUntilVisible:
    element:
      id: 'e2e_open_export_hub'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: 'e2e_open_export_hub'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: 'e2e_export_hub_screen'
    timeout: 30000
- waitForAnimationToEnd
