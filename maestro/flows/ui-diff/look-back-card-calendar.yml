## UI diff capture: look-back-card-calendar (Sess22 ADR-0034 D6)
##
## ふりかえりタブ hub の 5 card 目「カレンダー」 tap → PlanScreen 過去 30 日 default 確認。
##
## 経路:
## 1. plan-tab.yml と同じ前処理 (clearState + Onboarding skip + DEV seed)
## 2. ふりかえりタブ tap (e2e_tab_look_back)
## 3. e2e_look_back_card_calendar visible 確認
## 4. tap → e2e_plan_screen 表示確認 (過去 30 日が選択状態)
##
## R-31 整合: testID 命名は既存 pattern `e2e_look_back_card_<key>` に整合 (自動生成)。

appId: 'com.dooooraku.bonsailog'
name: 'UI diff capture: look-back-card-calendar (Sess22)'
tags:
  - ui-diff
  - sess22
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        text: 'http://localhost:8081'
    commands:
      - tapOn:
          text: 'http://localhost:8081'
          retryTapIfNoChange: true
      - waitForAnimationToEnd
      - pressKey: 'Back'
      - waitForAnimationToEnd

# Onboarding Welcome
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_welcome_cta'
    timeout: 60000
- tapOn:
    id: 'e2e_onboarding_welcome_cta'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Language ja
- extendedWaitUntil:
    visible:
      id: 'e2e_onboarding_lang_ja'
    timeout: 10000
- tapOn:
    id: 'e2e_onboarding_lang_ja'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- tapOn:
    id: 'e2e_onboarding_lang_next'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Tut1-5 skip
- tapOn:
    id: 'e2e_onboarding_tut_skip_tut5'
    retryTapIfNoChange: true
    optional: true
- waitForAnimationToEnd

# 盆栽タブ Empty CTA visible 確認
- extendedWaitUntil:
    visible:
      id: 'e2e_home_empty_cta'
    timeout: 30000

# 設定タブ tap (seed 投入用)
- tapOn:
    id: 'e2e_bonsai_home_settings'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# DEV seed button scroll + tap
- scrollUntilVisible:
    element:
      id: 'e2e_dev_seed_button'
    direction: DOWN
    timeout: 15000
    speed: 40
- tapOn:
    id: 'e2e_dev_seed_button'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# Alert dismiss
- tapOn:
    text: 'OK'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# ふりかえりタブ tap
- tapOn:
    id: 'e2e_tab_look_back'
    retryTapIfNoChange: true
- waitForAnimationToEnd

# 5 card 並び確認 (watering / calendar / wiring / search / tags)
- extendedWaitUntil:
    visible:
      id: 'e2e_look_back_hub'
    timeout: 10000
- assertVisible:
    id: 'e2e_look_back_card_watering'
- assertVisible:
    id: 'e2e_look_back_card_calendar'
- assertVisible:
    id: 'e2e_look_back_card_wiring'
- assertVisible:
    id: 'e2e_look_back_card_search'
- assertVisible:
    id: 'e2e_look_back_card_tags'

# カレンダー card tap → PlanScreen 過去 30 日 default 表示
- tapOn:
    id: 'e2e_look_back_card_calendar'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'e2e_plan_screen'
    timeout: 10000
- assertVisible:
    id: 'e2e_plan_legend'
