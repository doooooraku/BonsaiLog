## G0 PoC Y 案 (presentation:'modal') の Maestro flow
##
## X 案と同じ手順、route が `/(modals)/species-picker-y` に変わる。
## iOS では Sheet 風モーダル、Android では通常画面遷移。
##
## 実機実行コマンド:
##   maestro test maestro/flows/poc/g0-species-picker-Y.yml --repeat 5
appId: app.bonsailog
---
- launchApp:
    clearState: true
- openLink: bonsailog:///poc/g0-caller

- assertVisible:
    id: 'e2e_g0_caller_screen'

- tapOn:
    id: 'e2e_g0_caller_btn_y'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: 'e2e_species_picker_screen'

- tapOn:
    id: 'e2e_species_option_kuromatsu'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: 'e2e_g0_caller_screen'
- assertVisible:
    id: 'e2e_g0_caller_result'
    text: 'kuromatsu'
