## G0 PoC X 案 (完全画面 push) の Maestro flow
##
## Maestro 標準パターン (docs/how-to/maestro-standard-pattern.md):
## - 全 tap に retryTapIfNoChange: true
## - 全 tap 後に waitForAnimationToEnd: { timeout: 5000 }
## - testID で要素特定 (text 非依存)
##
## 検証手順:
## 1. App 起動 (deep link で G0 caller screen に直接遷移)
## 2. X 案 button tap → /bonsai/species-picker-x が push される
## 3. SpeciesPicker 画面で 黒松 を tap → router.back() で caller に戻る
## 4. caller で「現在の選択: kuromatsu」 表示を確認
##
## 5 回反復実行で 5/5 成功なら採用候補 (ADR-0024)。
##
## 実機実行コマンド:
##   maestro test maestro/flows/poc/g0-species-picker-X.yml --repeat 5
appId: app.bonsailog
---
- launchApp:
    clearState: true
- openLink: bonsailog:///poc/g0-caller

- assertVisible:
    id: 'e2e_g0_caller_screen'

- tapOn:
    id: 'e2e_g0_caller_btn_x'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: 'e2e_species_picker_screen'

- tapOn:
    id: 'e2e_species_option_kuromatsu'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: 'e2e_g0_caller_screen'
- assertVisible:
    id: 'e2e_g0_caller_result'
    text: 'kuromatsu'
