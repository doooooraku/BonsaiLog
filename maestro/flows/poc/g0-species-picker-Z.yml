## G0 PoC Z 案 (presentation:'formSheet' + detents + contentStyle) の Maestro flow
##
## X / Y 案と同じ手順、route が `/(modals)/species-picker-z` に変わる。
## iOS / Android 両方で native Sheet 風モーダル (detents [0.5, 1] で高さ可変)。
##
## 既知の落とし穴 (ADR-0024):
## - Expo v54 + RN 0.81 で formSheet content が空表示になるバグあり、
##   `contentStyle: { height: '100%' }` で予防 (本ブランチで適用済)。
## - @gorhom Issue #1753 (v4.6.0 Maestro バグ) の v5 系での状況は本 PoC で確定。
##
## 実機実行コマンド:
##   maestro test maestro/flows/poc/g0-species-picker-Z.yml --repeat 5
appId: app.bonsailog
---
- launchApp:
    clearState: true
- openLink: bonsailog:///poc/g0-caller

- assertVisible:
    id: 'e2e_g0_caller_screen'

- tapOn:
    id: 'e2e_g0_caller_btn_z'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: 'e2e_species_picker_screen'

- tapOn:
    id: 'e2e_species_option_kuromatsu'
    retryTapIfNoChange: true
- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: 'e2e_g0_caller_screen'
- assertVisible:
    id: 'e2e_g0_caller_result'
    text: 'kuromatsu'
