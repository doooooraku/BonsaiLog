# maestro/flows/notification-summary-tap.yml
# F-16 ローカル通知 (Issue #30、ADR-0014 §AC4)
# 当日まとめ通知タップ → S-08 作業予定カレンダー遷移確認 (実機検証フロー雛形)。
#
# 注: AC12 CalendarScreen (S-08) は v1.1 ADR で再評価のため未実装。
# 本フローは AC4-1〜4 の動線フローを実機検証時に整える雛形として配置。
# 実機検証は次セッション (Phase 0 PoC) で実施し、必要に応じてアサーションを拡張する。

appId: 'com.doooooraku.bonsailog'
name: 'F-16 - notification summary tap reach'
tags:
  - f-16

steps:
  - launchApp:
      label: 'アプリ起動'
  # 注: 実機検証は通知タップを Maestro で再現できないため、
  # ここでは Settings からの動線到達 + Deep Link 受信時の遷移先 (AC4-1〜4) を確認する。
  - tapOn:
      text: '設定'
      label: '設定タブ or ヘッダーから設定画面へ遷移'
      optional: true
  # Phase 1.6-T6 A2a (Issue #330): 通知 toggle はサブ画面 /settings/notifications に集約済
  - tapOn:
      id: 'e2e_settings_notifications_row'
      label: '「通知設定 ›」 行タップで通知設定サブ画面へ遷移'
      optional: true
  - assertVisible:
      id: 'e2e_notif_summary_toggle'
      label: '当日まとめ通知トグルが表示されることを確認'
      optional: true
  # 通知 ON 化 → 時刻編集ボタンが表示されるまで確認 (AC4-4 動線)
  - tapOn:
      id: 'e2e_notif_summary_toggle'
      label: '当日まとめ通知トグルをタップ'
      optional: true
  - assertVisible:
      id: 'e2e_notif_summary_edit_time'
      label: '通知時刻編集ボタンが表示されることを確認 (動線確立)'
      optional: true
