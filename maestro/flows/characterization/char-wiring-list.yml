# Phase 3 PR 1-5 characterization: 針金がけ一覧 (god screen wiring) 到達 + 描画 smoke。
#
# PR 1-4 (god 描画 smoke) を Maestro に統合した一環。god screen が「クラッシュせず主要要素を表示」
# することを実機で凍結する。既存 flow が覆っていない wiring 画面が対象。
#
# 前提: no-launcher の preview build (dist/bonsailog-preview-local.apk、release、Dev Launcher 無し)。
# 自己完結: clearState:true で fresh 起動 → onboarding を skip 通過 → タブ到達 → god screen へ。
# 導線: ふりかえりタブ (e2e_tab_look_back) → CareHub 針金がけカード (e2e_look_back_card_wiring)
#       → 針金がけ一覧 (e2e_wiring_list_screen)。
appId: 'com.dooooraku.bonsailog'
---
- launchApp:
    clearState: true
    label: 'fresh 起動 (onboarding 未完了状態)'

# onboarding を skip 通過 (welcome → 言語 next → tut skip で setCompleted + タブ遷移)
- runFlow:
    when:
      visible:
        id: 'e2e_onboarding_welcome'
    commands:
      - tapOn:
          id: 'e2e_onboarding_welcome_cta'
          retryTapIfNoChange: true
      # 固定待ちではなく「次要素が出るまで」待つ (描画ラグによる timing 競合を回避)
      - extendedWaitUntil:
          visible:
            id: 'e2e_onboarding_lang_next'
          timeout: 15000
      - tapOn:
          id: 'e2e_onboarding_lang_next'
          retryTapIfNoChange: true
      # tut の skip ボタン (どの step に着地しても拾えるよう regex prefix) が出るまで待つ
      - extendedWaitUntil:
          visible:
            id: 'e2e_onboarding_tut_skip_.*'
          timeout: 15000
      - tapOn:
          id: 'e2e_onboarding_tut_skip_.*'
          retryTapIfNoChange: true
      - waitForAnimationToEnd:
          timeout: 3000

# タブ到達待ち (ふりかえりタブを起点に)
- extendedWaitUntil:
    visible:
      id: 'e2e_tab_look_back'
    timeout: 20000
    label: 'タブバー (ふりかえり) 表示を待つ'

- tapOn:
    id: 'e2e_tab_look_back'
    retryTapIfNoChange: true
    label: 'ふりかえりタブをタップ'
- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    id: 'e2e_look_back_hub'
    label: 'CareHub が表示されることを確認'

- tapOn:
    id: 'e2e_look_back_card_wiring'
    retryTapIfNoChange: true
    label: '針金がけカードをタップ'
- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    id: 'e2e_wiring_list_screen'
    label: '針金がけ一覧 (god screen) がクラッシュせず表示されることを確認'
